<!DOCTYPE html>
<html lang="en">

<body>
  <header>
    <a href="index.html" class="logo">CINE<span>VAULT</span></a>

        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="watchlist.html">Watchlist</a></li>

  <main class="container">
    <section class="hero">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for movies or TV shows..." autocomplete="off" />

      </div>

    <section class="genre-filters">
      <div id="genre-container" class="genre-container"></div>

    <section class="trending">
      <div class="section-header">
        <h2>Trending Now</h2>
        <div class="controls">
           <select id="sort-select">
              <option value="popularity.desc">Sort by Popularity</option>
              <option value="vote_average.desc">Sort by Rating</option>
              <option value="release_date.desc">Sort by Release Date</option>
           </select>
        </div>
      </div>
      <div id="movie-grid" class="movie-grid">
        <div class="loading">Loading...</div>
      </div>
    </section>
  </main>
